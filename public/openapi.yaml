openapi: 3.0.3
info:
  title: nmonzzon Studio API
  description: |
    API REST de CodeIgniter 4 para catálogo, e-commerce, encargos de retrato, reservas de arte en vivo y panel admin.
    Las respuestas de éxito suelen seguir `{ "status": "success", "message": string, "data": ... }`.
    Los errores: `{ "status": "error", "message": string, "errors"?: object }`.
  version: "1.0.0"
  contact:
    name: nmonzzon Studio

servers:
  - url: "{baseUrl}"
    description: Sustituye por el origen de tu entorno (p. ej. https://nmzonzzonstudio.ddev.site)
    variables:
      baseUrl:
        default: https://localhost

tags:
  - name: Auth
    description: Registro, login JWT, perfil y recuperación de contraseña
  - name: Catalog
    description: Lectura pública de catálogo y contenidos
  - name: Contact & Chatbot
  - name: Live art
  - name: Portrait orders
  - name: Shop orders
  - name: Coupons
  - name: Webhooks & cron
  - name: Settings
  - name: Admin
    description: Requiere JWT con role `admin`; si no, 403

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token emitido en POST /api/auth/login o /api/auth/register (access_token)

  schemas:
    ApiSuccess:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
        data: {}
    ApiError:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
        errors:
          type: object
          additionalProperties: true
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirm]
      properties:
        name: { type: string, minLength: 2, maxLength: 100 }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        password_confirm: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    PortraitOrderCreate:
      type: object
      required: [portrait_style_id, portrait_size_id, num_figures]
      properties:
        portrait_style_id: { type: integer }
        portrait_size_id: { type: integer }
        num_figures: { type: integer, minimum: 1, maximum: 10 }
        with_frame: { type: boolean }
        frame_type: { type: string, maxLength: 100 }
        client_notes: { type: string, maxLength: 2000 }
    ShopOrderCreate:
      type: object
      required: [items, shipping_name, shipping_address, shipping_city, shipping_postal_code, shipping_country]
      properties:
        items:
          type: array
          items:
            type: object
            required: [product_id, quantity]
            properties:
              product_id: { type: integer }
              variant_id: { type: integer, nullable: true }
              quantity: { type: integer, minimum: 1 }
        shipping_name: { type: string }
        shipping_address: { type: string }
        shipping_city: { type: string }
        shipping_postal_code: { type: string }
        shipping_country: { type: string }
        shipping_phone: { type: string }
        coupon_code: { type: string }
        notes: { type: string }
    LiveArtBookingCreate:
      type: object
      required: [contact_name, contact_email, event_date, event_location, event_city, event_type]
      properties:
        contact_name: { type: string, maxLength: 100 }
        contact_email: { type: string, format: email }
        contact_phone: { type: string }
        event_date: { type: string, format: date }
        event_start_time: { type: string }
        event_end_time: { type: string }
        event_location: { type: string }
        event_city: { type: string }
        event_postal_code: { type: string }
        event_type:
          type: string
          enum: [wedding, corporate, birthday, festival, private, other]
        num_guests: { type: integer }
        num_portraits: { type: integer }
        travel_distance_km: { type: number, format: float }
        special_requirements: { type: string }
    ContactCreate:
      type: object
      required: [name, email, subject, message, category]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        subject: { type: string }
        message: { type: string }
        category:
          type: string
          enum: [general, portrait, live_art, branding, design, products, other]
    ChatbotMessage:
      type: object
      required: [message]
      properties:
        message: { type: string, maxLength: 500 }
    CouponValidate:
      type: object
      required: [code]
      properties:
        code: { type: string }
    PortraitStatus:
      type: string
      enum: [quote, accepted, photo_received, in_progress, revision, delivered, completed, cancelled]

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Alta de cliente
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Tokens y usuario
        "422":
          description: Validación
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200": { description: access_token y refresh_token }
        "401": { description: Credenciales inválidas }

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "200": { description: Nuevo access_token }
        "401": { description: Refresh inválido o revocado }

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Solicitar enlace de restablecimiento
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        "200": { description: OK (mensaje genérico por seguridad) }

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Restablecer contraseña con token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                password: { type: string }
                password_confirm: { type: string }
      responses:
        "200": { description: OK }
        "422": { description: Error validación }

  /api/auth/profile:
    get:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      summary: Perfil del usuario autenticado
      responses:
        "200": { description: Datos usuario }
        "401": { description: Sin token }
    put:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      summary: Actualizar perfil (name, phone, avatar)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                phone: { type: string }
                avatar: { type: string }
      responses:
        "200": { description: OK }
        "401": { description: Sin token }

  /api/auth/logout:
    post:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      summary: Revocar refresh tokens del usuario
      responses:
        "200": { description: OK }

  /api/categories:
    get:
      tags: [Catalog]
      summary: Listar categorías (portfolio)
      responses:
        "200": { description: Lista }

  /api/categories/{id}:
    get:
      tags: [Catalog]
      summary: Detalle categoría
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /api/admin/categories:
    post:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      summary: Crear categoría
      responses:
        "201": { description: Creado }
        "403": { description: No admin }

  /api/admin/categories/{id}:
    put:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
    delete:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }

  /api/portrait-styles:
    get:
      tags: [Catalog]
      summary: Estilos de retrato
      responses:
